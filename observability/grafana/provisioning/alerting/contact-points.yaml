apiVersion: 1

# Canais de notificação — onde o Grafana envia alertas
#
# Para desenvolvimento local: usa o canal padrão do Grafana (UI only)
# Para produção: substituir pela URL real do Slack, PagerDuty ou email
#
# Grafana suporta: slack, email, webhook, pagerduty, opsgenie, telegram, etc.

contactPoints:

  # Canal padrão — alertas aparecem na UI do Grafana
  # Em produção: substituir pela URL do webhook do Slack ou email SMTP
  - orgId: 1
    name: vidalongaflix-ops
    receivers:
      - uid: vlf-grafana-oncall
        type: webhook
        settings:
          # Trocar pela URL real quando configurar Slack/PagerDuty
          # Slack:      https://hooks.slack.com/services/xxx/yyy/zzz
          # Discord:    https://discord.com/api/webhooks/xxx/yyy
          # Teams:      https://xxx.webhook.office.com/webhookb2/...
          url: http://localhost:9093/webhook-placeholder
          httpMethod: POST
          title: |
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }} x{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}
          message: |
            {{ range .Alerts }}
            Alerta: {{ .Annotations.summary }}
            Detalhe: {{ .Annotations.description }}
            Severidade: {{ .Labels.severity }}
            Dashboard: {{ .Annotations.runbook_url }}
            {{ end }}
        disableResolveMessage: false
