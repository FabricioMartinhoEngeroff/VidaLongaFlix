# Grafana Provisioning — Data Sources
#
# Este arquivo configura automaticamente as fontes de dados no Grafana.
# Sem ele, você teria que configurar manualmente na UI toda vez que
# o container subir do zero.
#
# O Grafana lê este arquivo na inicialização e cria os data sources.

apiVersion: 1

datasources:

  # ─── MÉTRICAS (Mimir / Prometheus) ──────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://mimir:9009/prometheus
    isDefault: true
    editable: true

  # ─── LOGS (Loki) ────────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    editable: true
    jsonData:
      # Liga Loki ao Tempo: ao ver um trace_id em um log, o Grafana
      # cria um link direto para o trace no Tempo — isso é o "drilldown"
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"(\w+)"'
          url: '$${__value.raw}'
          datasourceUid: tempo

  # ─── TRACES (Tempo) ──────────────────────────────────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    editable: true
    jsonData:
      # Liga Tempo ao Loki: ao ver um trace, o Grafana mostra os logs
      # gerados durante aquela requisição — fecha o ciclo de observabilidade
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false
      # Liga Tempo ao Prometheus: mostra métricas do serviço ao lado do trace
      serviceMap:
        datasourceUid: prometheus
      # Habilita busca por atributos (service.name, http.status, etc.)
      search:
        hide: false
      nodeGraph:
        enabled: true           # mapa visual de dependências entre serviços
