apiVersion: 1

# Políticas de roteamento — quem recebe qual alerta e com qual frequência
#
# group_wait:     quanto esperar para agrupar alertas antes de enviar
# group_interval: intervalo entre envios de um grupo já ativo
# repeat_interval: quanto esperar para reenviar se o alerta não resolveu

policies:
  - orgId: 1
    receiver: vidalongaflix-ops   # canal padrão para tudo que não tem rota específica
    group_by: [alertname, severity]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h

    routes:
      # Críticos: notificar rápido e repetir com frequência
      - receiver: vidalongaflix-ops
        matchers:
          - severity = critical
        group_wait: 10s           # espera só 10s para agrupar
        group_interval: 1m
        repeat_interval: 30m      # repetir a cada 30min enquanto não resolver

      # Warnings: menos urgente, agrupa e notifica com mais calma
      - receiver: vidalongaflix-ops
        matchers:
          - severity = warning
        group_wait: 1m
        group_interval: 5m
        repeat_interval: 2h
