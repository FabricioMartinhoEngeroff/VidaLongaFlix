# Application Name
spring.application.name=NutriLongaVidaFlix

# Active Profile
spring.profiles.active=local

# Server Configuration
server.port=8090
server.servlet.context-path=/api

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA and Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway Configuration
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# Security Configuration
# O segredo do JWT vem de vari�vel de ambiente em produ��o
api.security.token.secret=${JWT_SECRET:dev-secret-change-in-production}
# Dura��o do token em horas
api.security.token.expiration-hours=2

# File Upload Configuration
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

# Logging Configuration
logging.level.root=INFO
logging.level.com.dvFabricio=DEBUG
logging.file.name=logs/nutrilongavida.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Caching
spring.cache.type=simple

# ========================================
# WHATSAPP BUSINESS API (Meta Graph API)
# ========================================
# ID do número de telefone no Meta Business Manager
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:966549409879972}
# Token de acesso gerado no Meta for Developers
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
# Versão da Graph API
whatsapp.api-version=v22.0
# Nome do template aprovado no WhatsApp Manager
whatsapp.template.name=${WHATSAPP_TEMPLATE_NAME:hello_world}
# Idioma do template
whatsapp.template.language=${WHATSAPP_TEMPLATE_LANGUAGE:en_US}
# false em dev/test para simular; true em produção
whatsapp.enabled=${WHATSAPP_ENABLED:false}

