# Application Name
spring.application.name=NutriLongaVidaFlix

# Active Profile (permite sobrescrever via variável de ambiente)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Jackson — serializar datas como ISO-8601 string (não como array numérico)
spring.jackson.serialization.write-dates-as-timestamps=false

# Server Configuration
server.port=8090
server.servlet.context-path=/api

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA and Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway Configuration
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# Security Configuration
# Em produção: defina JWT_SECRET como variável de ambiente na AWS
api.security.token.secret=${JWT_SECRET:dev-secret-change-in-production}
api.security.token.expiration-hours=2

# CORS — em produção defina CORS_ALLOWED_ORIGINS como variável de ambiente
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ========================================
# ADMIN INICIAL (criado pelo DataInitializer)
# ========================================
# Em produção: defina ADMIN_EMAIL e ADMIN_PASSWORD como variáveis de ambiente
admin.email=${ADMIN_EMAIL:admin@vidalongaflix.com}
admin.password=${ADMIN_PASSWORD:Admin@123456}

# File Upload Configuration
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

# Logging Configuration
logging.level.root=INFO
logging.level.com.dvFabricio=DEBUG
logging.file.name=logs/nutrilongavida.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Caching
spring.cache.type=simple

