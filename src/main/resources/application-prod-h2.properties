# ==========================================
# PERFIL DE PRODUÇÃO COM H2 — AWS Elastic Beanstalk
# Usado para reduzir custo (sem RDS). Projeto de uso pessoal,
# sem necessidade de persistência garantida entre deploys.
#
# ATENÇÃO: H2 em arquivo sobrevive a restarts do container,
# mas o filesystem do EB é efêmero entre deploys de nova versão —
# uma nova versão da aplicação pode resultar em banco zerado.
# ==========================================

# Banco de dados — H2 em arquivo (sobrevive a restarts simples)
spring.datasource.url=jdbc:h2:file:${MEDIA_STORAGE_PATH:/tmp/vidalongaflix-media}/h2-data/proddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway desabilitado — schema gerenciado pelo Hibernate (mesmo padrão do perfil local)
spring.flyway.enabled=false

# Console H2 desabilitado em produção
spring.h2.console.enabled=false

# Jackson — datas como ISO-8601 string
spring.jackson.serialization.write-dates-as-timestamps=false

# Multipart uploads
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:512MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:512MB}

# Forward headers — necessário para gerar URLs corretas atrás do nginx/EB
server.forward-headers-strategy=FRAMEWORK

# Armazenamento de mídia
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.region=${AWS_REGION:us-east-2}
aws.cdn.base-url=${CDN_BASE_URL:}
media.storage.path=${MEDIA_STORAGE_PATH:/tmp/vidalongaflix-media}

# JWT
api.security.token.secret=${JWT_SECRET}
api.security.token.expiration-hours=2

# Admin inicial (criado pelo DataInitializer)
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

# CORS — domínio do frontend CloudFront ou customizado
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ========================================
# EMAIL — Gmail SMTP via App Password
# Variáveis obrigatórias no Elastic Beanstalk:
#   MAIL_USERNAME=vidalongaflix@gmail.com
#   MAIL_PASSWORD=<App Password 16 caracteres>
# ========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logs
logging.level.root=INFO
logging.level.com.dvFabricio=INFO

# Actuator — health check para o Beanstalk
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# ========================================
# OBSERVABILIDADE — OpenTelemetry (produção → Grafana Cloud)
#
# Variáveis obrigatórias no Elastic Beanstalk:
#   OTLP_ENDPOINT=https://otlp-gateway-prod-sa-east-1.grafana.net/otlp
#   OTLP_AUTH_HEADER=<base64(instanceId:apiToken)>
# ========================================

management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=${OTLP_ENDPOINT}/v1/metrics
management.otlp.metrics.export.headers.Authorization=Basic ${OTLP_AUTH_HEADER}
management.otlp.metrics.export.step=30s

management.tracing.sampling.probability=${OTEL_SAMPLING_PROBABILITY:0.1}
management.otlp.tracing.endpoint=${OTLP_ENDPOINT}/v1/traces
management.otlp.tracing.headers.Authorization=Basic ${OTLP_AUTH_HEADER}

management.otlp.logging.export.enabled=true
management.otlp.logging.endpoint=${OTLP_ENDPOINT}/v1/logs
management.otlp.logging.headers.Authorization=Basic ${OTLP_AUTH_HEADER}
