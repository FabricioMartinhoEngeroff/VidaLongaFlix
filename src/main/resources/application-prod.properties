# ==========================================
# PERFIL DE PRODUÇÃO — AWS Elastic Beanstalk
# Todas as propriedades sensíveis devem ser
# definidas como variáveis de ambiente no EB.
# ==========================================

# Banco de dados — RDS PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway — aplica migrations no startup
spring.flyway.enabled=true

# Desabilita console H2 em produção
spring.h2.console.enabled=false

# Jackson — datas como ISO-8601 string
spring.jackson.serialization.write-dates-as-timestamps=false

# Multipart uploads — manter explicito em producao para evitar drift de configuracao
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:512MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:512MB}

# JWT
api.security.token.secret=${JWT_SECRET}
api.security.token.expiration-hours=2

# Admin inicial (criado pelo DataInitializer)
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

# CORS — domínio do frontend CloudFront ou customizado
# Separar múltiplos domínios por vírgula
# Ex: https://vidalongaflix.com.br,https://xxxx.cloudfront.net
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# WhatsApp Business API
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.api-version=v22.0
whatsapp.template.name=${WHATSAPP_TEMPLATE_NAME:welcome_template}
whatsapp.template.language=${WHATSAPP_TEMPLATE_LANGUAGE:pt_BR}
whatsapp.enabled=${WHATSAPP_ENABLED:false}

# Logs
logging.level.root=INFO
logging.level.com.dvFabricio=INFO

# Actuator — health check para o Beanstalk/ECS
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# ========================================
# OBSERVABILIDADE — OpenTelemetry (produção → Grafana Cloud)
#
# Variáveis obrigatórias no Elastic Beanstalk:
#
#   OTLP_HTTP_ENDPOINT=https://otlp-gateway-prod-sa-east-1.grafana.net/otlp
#   → URL fornecida pelo Grafana Cloud em "My Account" > "OTLP"
#
#   OTLP_AUTH_HEADER=<base64(instanceId:apiToken)>
#   → Gerar: echo -n "123456:glc_xxx..." | base64
#
# Variável opcional (padrão 10%):
#   OTEL_SAMPLING_PROBABILITY=0.1
#   → Aumentar para 1.0 durante investigação de incidente
# ========================================

# Métricas → Grafana Cloud Mimir
management.otlp.metrics.export.url=${OTLP_ENDPOINT}/v1/metrics
management.otlp.metrics.export.headers.authorization=Basic ${OTLP_AUTH_HEADER}

# Traces → Grafana Cloud Tempo
# 10% de amostragem em produção — reduz custo e volume
# Aumentar para 1.0 temporariamente durante investigação de incidentes
management.tracing.sampling.probability=${OTEL_SAMPLING_PROBABILITY:0.1}
management.otlp.tracing.endpoint=${OTLP_ENDPOINT}/v1/traces
management.otlp.tracing.headers.authorization=Basic ${OTLP_AUTH_HEADER}

# Logs → Grafana Cloud Loki
management.otlp.logging.endpoint=${OTLP_ENDPOINT}/v1/logs
management.otlp.logging.headers.authorization=Basic ${OTLP_AUTH_HEADER}
