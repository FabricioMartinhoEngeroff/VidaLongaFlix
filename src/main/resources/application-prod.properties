# ==========================================
# PERFIL DE PRODUÇÃO — AWS Elastic Beanstalk
# Todas as propriedades sensíveis devem ser
# definidas como variáveis de ambiente no EB.
# ==========================================

# Banco de dados — RDS PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway — aplica migrations no startup
spring.flyway.enabled=true

# Desabilita console H2 em produção
spring.h2.console.enabled=false

# Jackson — datas como ISO-8601 string
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT
api.security.token.secret=${JWT_SECRET}
api.security.token.expiration-hours=2

# Admin inicial (criado pelo DataInitializer)
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

# CORS — domínio do frontend CloudFront ou customizado
# Separar múltiplos domínios por vírgula
# Ex: https://vidalongaflix.com.br,https://xxxx.cloudfront.net
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# WhatsApp Business API
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.api-version=v22.0
whatsapp.template.name=${WHATSAPP_TEMPLATE_NAME:hello_world}
whatsapp.template.language=${WHATSAPP_TEMPLATE_LANGUAGE:en_US}
whatsapp.enabled=${WHATSAPP_ENABLED:false}

# Logs
logging.level.root=INFO
logging.level.com.dvFabricio=INFO

# Actuator — health check para o Beanstalk/ECS
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
