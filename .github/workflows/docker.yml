name: Docker

on:
  workflow_call:
    inputs:
      push:
        description: "Se true, faz push da imagem no Docker Hub (requer secrets)."
        type: boolean
        required: false
        default: false
      image:
        description: "Nome completo da imagem (ex: usuario/vidalongaflix). Se vazio, usa DOCKERHUB_USERNAME/vidalongaflix."
        type: string
        required: false
        default: ""
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

jobs:
  docker:
    name: Build (e opcionalmente Push)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      IMAGE_NAME: ${{ inputs.image != '' && inputs.image || format('{0}/vidalongaflix', secrets.DOCKERHUB_USERNAME) }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Normalizar tag da branch
        shell: bash
        run: echo "REF_TAG=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_ENV"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validar secrets do Docker Hub (quando push=true)
        if: ${{ inputs.push }}
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || (echo "Missing secret: DOCKERHUB_USERNAME" && exit 1)
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || (echo "Missing secret: DOCKERHUB_TOKEN" && exit 1)

      - name: Login no Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (e Push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ inputs.push }}
          load: ${{ !inputs.push }}   # carrega localmente quando não faz push (PRs/feature branches)
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ env.REF_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Segurança ────────────────────────────────────────────────────────────
      # Docker Scout: quickview — resumo de Critical/High/Medium/Low por camada
      # Requer login no Docker Hub (secrets opcionais — não falha se ausentes)
      - name: Docker Scout — quickview
        if: ${{ inputs.push }}
        uses: docker/scout-action@v1.17.0
        with:
          command: quickview
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          ignore-base: false
          dockerhub-user: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Trivy: scan de vulnerabilidades — banco de dados independente do Scout
      # exit-code 0 = reporta mas não bloqueia (alterar para 1 quando todos os CRITICAL/HIGH estiverem corrigidos)
      - name: Trivy — scan de vulnerabilidades
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          scan-type: image
          scanners: vuln
          severity: CRITICAL,HIGH
          format: table
          exit-code: '0'
