name: Integração Contínua

# GATILHO: quando executar esse workflow?
on:
  push:
    branches: [ "main", "feat/*" ]   # a cada push na main ou branches feat/
  pull_request:
    branches: [ "main" ]             # a cada PR aberto para a main

jobs:
  test:
    name: Rodar Testes
    runs-on: ubuntu-latest           # máquina limpa Ubuntu (igual ao vídeo)

    steps:
      # 1. Baixa o código do repositório para a máquina do GitHub
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Instala o Java 17 (mesma versão do seu projeto)
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'    # distribuição gratuita do Java

      # 3. Cache do Maven para não baixar as dependências do zero toda vez
      - name: Cache das dependências Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      # 4. Roda todos os testes (equivalente ao "npm test" do vídeo)
      - name: Executar testes
        run: ./mvnw test

  docker:
    name: Docker (build/push)
    needs: test
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/docker.yml
    with:
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    secrets: inherit

  deploy:
    name: Deploy no Elastic Beanstalk
    needs: docker
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: production      # aguarda aprovação manual antes de deployar
    permissions:
      id-token: write  # necessário para solicitar o token OIDC à AWS
      contents: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # OIDC: o GitHub pede uma credencial temporária à AWS (válida por 15 min)
      # A AWS verifica se o pedido vem do repo correto antes de conceder
      # Substitui AWS_ACCESS_KEY_ID e AWS_SECRET_ACCESS_KEY permanentes
      - name: Configurar credenciais AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::359598898309:role/github-actions-vidalongaflix
          aws-region: us-east-2

      - name: Gerar Dockerrun.aws.json
        run: |
          cat > Dockerrun.aws.json << EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "${{ secrets.DOCKERHUB_USERNAME }}/vidalongaflix:${{ github.sha }}",
              "Update": "true"
            },
            "Ports": [{ "ContainerPort": 8090 }]
          }
          EOF

      - name: Zipar pacote de deploy
        run: zip -r deploy.zip Dockerrun.aws.json .platform

      - name: Deploy no Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          application_name: vidalongaflix-backend
          environment_name: Vidalongaflix-backend-env
          version_label: ${{ github.sha }}
          region: us-east-2
          deployment_package: deploy.zip
          existing_bucket_name: elasticbeanstalk-us-east-2-359598898309
          wait_for_environment_recovery: 120
