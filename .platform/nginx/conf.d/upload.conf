# Elastic Beanstalk / Nginx upload tuning for Admin Videos multipart uploads.
# These directives are applied before the request reaches Spring Boot.

# Accept larger media uploads instead of failing with the Nginx default size limit.
client_max_body_size 512M;

# Keep reverse-proxy connections open long enough for slower uploads.
proxy_connect_timeout 60s;
proxy_read_timeout 300s;
proxy_send_timeout 300s;
send_timeout 300s;

# Stream the request body to the app instead of buffering the full payload first.
proxy_request_buffering off;
