# Elastic Beanstalk / Nginx upload tuning for Admin Videos multipart uploads.
# These directives apply before the request reaches Spring Boot.

# Allow larger media uploads to pass through the reverse proxy.
client_max_body_size 512M;

# Keep proxy connections open long enough for slower uploads on unstable networks.
proxy_connect_timeout 60s;
proxy_read_timeout 300s;
proxy_send_timeout 300s;
send_timeout 300s;

# Stream request bodies instead of buffering the full upload in Nginx first.
proxy_request_buffering off;
